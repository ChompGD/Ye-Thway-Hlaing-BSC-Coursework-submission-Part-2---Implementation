<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUARE JUMP - Fast Pulse Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --accent-char: #00d2ff;
            --text-main: #ffffff;
            --danger: #ff4444;
            --victory: #00ff88;
            --exit-yellow: #f8ff00;
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, rgba(26,26,58,0.5) 0%, rgba(5,5,16,1) 100%);
            font-family: 'Press Start 2P', cursive;
            color: var(--text-main);
            transition: background-color 0.1s linear;
        }
        
        .floating-particle {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            z-index: 0;
            animation: floatUp linear infinite;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
        
        #ui-layer {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        #ui-layer h2 {
            font-size: 1.2rem;
            margin: 0;
            color: #fff;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .overlay h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
        }
        
        #pause-overlay h1 {
            text-shadow: 0 0 20px var(--accent-char);
        }
        
        #win-overlay h1 {
            color: var(--victory);
            text-shadow: 0 0 20px var(--victory);
        }
        
        .menu-btn {
            width: 280px;
            padding: 20px;
            margin: 10px;
            background: transparent;
            border: 3px solid var(--accent-char);
            color: var(--text-main);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .menu-btn:hover {
            background: var(--accent-char);
            color: #000;
            box-shadow: 0 0 20px var(--accent-char);
        }
        
        .win-btn {
            border-color: var(--victory);
            color: var(--victory);
        }
        
        .win-btn:hover {
            background: var(--victory);
            box-shadow: 0 0 20px var(--victory);
        }
        
        .exit-btn {
            border-color: var(--exit-yellow);
            color: var(--exit-yellow);
        }
        
        .exit-btn:hover {
            background: var(--exit-yellow);
            color: #000;
            box-shadow: 0 0 20px var(--exit-yellow);
        }
        
        .exit-red-btn {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .exit-red-btn:hover {
            background: var(--danger);
            color: #000;
            box-shadow: 0 0 20px var(--danger);
        }
        
        canvas {
            display: block;
            position: relative;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="particle-container"></div>
    <div id="ui-layer"><h2 id="percentage-display">0%</h2></div>

    <div id="pause-overlay" class="overlay">
        <h1>PAUSED</h1>
        <button class="menu-btn" onclick="togglePause()">CONTINUE</button>
        <button class="menu-btn" onclick="resetFromPause()">RESTART</button>
        <button class="menu-btn exit-btn" onclick="exitToLevels()">EXIT</button>
    </div>

    <div id="win-overlay" class="overlay">
        <h1>STAGE COMPLETED</h1>
        <button class="menu-btn win-btn" onclick="resetLevelOnly()">RESTART</button>
        <button class="menu-btn exit-red-btn" onclick="exitToLevels()">EXIT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const particleContainer = document.getElementById("particle-container");
        const pauseOverlay = document.getElementById("pause-overlay");
        const winOverlay = document.getElementById("win-overlay");
        const percentageDisplay = document.getElementById("percentage-display");

        const bgMusic = new Audio('audio/level1.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.5;

        const deathSfx = new Audio('audio/death.mp3');
        deathSfx.volume = 0.5;

        const stageCompleteSfx = new Audio('audio/stage_complete.mp3');
        stageCompleteSfx.volume = 0.5;

        const BLOCK_SIZE = 40;
        const ZOOM_LEVEL = 1.5;
        const PULSE_TRIGGER_X = 7400;
        const PULSE_PERIOD = 0.6;

        let gameSpeed = 4;
        let gravity = 0.4;
        let jumpForce = -9.5;
        let terminalVelocity = 6;

        let isGameOver = false;
        let isGameWon = false;
        let isInputActive = false;
        let groundY = 0;

        let firstTimeStart = true;
        let hasStartedOnce = false;
        let countdownValue = "";
        let isCountingDown = false;

        let isPaused = false;
        let totalDistanceTraveled = 0;
        let particlesSpawned = false;
        let scoreSent = false;

        let autoRestartEnabled = false;
        let showPercentageEnabled = true;
        let displayDeathEnabled = false;
        let autoRestartTimer = null;

        let playerCharImg = 'images/square1.png';
        let playerCharColor = '#00d2ff';
        let playerImgObj = new Image();
        playerImgObj.src = playerCharImg;

        let bgmVolume = 1;
        let sfxVolume = 1;

        const player = {
            x: 160,
            y: 0,
            width: BLOCK_SIZE,
            height: BLOCK_SIZE,
            dy: 0,
            rotation: 0,
            isGrounded: true
        };

        const levelBase = [
            { type: 'spike', x: 800 },
            { type: 'block', x: 1320, w: 360, h: 40 },
            { type: 'spike', x: 1640, yOff: 40 },
            { type: 'spike', x: 2260 },

            { type: 'block', x: 3180, w: 40, h: 120 },
            { type: 'spike', x: 3220 },
            { type: 'spike', x: 3260 },
            { type: 'spike', x: 3300 },
            { type: 'block', x: 3340, w: 40, h: 160 },
            { type: 'spike', x: 3820 },
            { type: 'spike', x: 4400 },
            { type: 'spike', x: 4440 },
            { type: 'block', x: 4760, w: 200, h: 80 },
            { type: 'block', x: 4960, w: 280, h: 40 },
            { type: 'spike', x: 5200, yOff: 40 },
            { type: 'block', x: 5600, w: 80, h: 40 },
            { type: 'spike', x: 5680 },

            { type: 'block', x: 6000, w: 80, h: 120 },
            { type: 'spike', x: 6440 },
            { type: 'spike', x: 6480 },
            { type: 'spike', x: 6680 },
            { type: 'spike', x: 6720 },
            { type: 'block', x: 6960, w: 240, h: 80 },
            { type: 'block', x: 7200, w: 640, h: 160 },
            { type: 'spike', x: 7360, yOff: 160 },
            { type: 'spike', x: 7400, yOff: 160 },
            { type: 'spike', x: 7640, yOff: 160 },
            { type: 'spike', x: 7680, yOff: 160 },
            { type: 'spike', x: 7840 },

            { type: 'spike', x: 9040 },

            { type: 'spike', x: 10920 },
            { type: 'spike', x: 10960 },
            { type: 'spike', x: 11000 },
            { type: 'block', x: 11040, w: 40, h: 160 },
            { type: 'spike', x: 11080 },
            { type: 'spike', x: 11120 },
            { type: 'spike', x: 11160 },
            { type: 'block', x: 11200, w: 40, h: 200 },
            { type: 'spike', x: 11240 },
            { type: 'spike', x: 11280 },
            { type: 'spike', x: 11320 },
            { type: 'block', x: 11360, w: 40, h: 240 },
            { type: 'spike', x: 11400 },
            { type: 'spike', x: 11440 },
            { type: 'spike', x: 11480 },
            { type: 'block', x: 11520, w: 40, h: 280 },
            { type: 'spike', x: 11560 },
            { type: 'spike', x: 11600 },
            { type: 'spike', x: 11640 },
            { type: 'block', x: 11680, w: 40, h: 320 },
            { type: 'spike', x: 11720 },
            { type: 'spike', x: 11760 },
            { type: 'spike', x: 11800 },
            { type: 'block', x: 11840, w: 40, h: 360 },
            { type: 'spike', x: 11900, yOff: 460, isUpsideDown: true },
            { type: 'spike', x: 11940, yOff: 460, isUpsideDown: true },
            { type: 'block', x: 12500, w: 80, h: 80 },
            { type: 'spike', x: 12580 },
            { type: 'spike', x: 12620 },
            { type: 'spike', x: 12660 },
            { type: 'block', x: 12700, w: 80, h: 120 },
            { type: 'spike', x: 12780 },
            { type: 'spike', x: 12820 },
            { type: 'spike', x: 12860 },
            { type: 'block', x: 12900, w: 80, h: 160 },
            { type: 'spike', x: 12980 },
            { type: 'spike', x: 13020 },
            { type: 'spike', x: 13060 },
            { type: 'block', x: 13100, w: 80, h: 200 },
            { type: 'spike', x: 13180 },
            { type: 'spike', x: 13220 },
            { type: 'spike', x: 13260 },
            { type: 'block', x: 13300, w: 80, h: 240 },
            { type: 'spike', x: 13380 },
            { type: 'spike', x: 13420 },
            { type: 'spike', x: 13460 },
            { type: 'block', x: 13500, w: 80, h: 280 },
            { type: 'spike', x: 13580 },
            { type: 'spike', x: 13620 },
            { type: 'spike', x: 13660 },
            { type: 'block', x: 13700, w: 80, h: 320 },
            { type: 'spike', x: 13780 },
            { type: 'spike', x: 13820 },
            { type: 'spike', x: 13860 },
            { type: 'block', x: 13900, w: 80, h: 360 },
            { type: 'spike', x: 13980 },
            { type: 'spike', x: 14020 },
            { type: 'spike', x: 14060 },
            { type: 'block', x: 14100, w: 80, h: 400 },
            { type: 'finish', x: 14800, w: 60 }
        ];

        const finishLineX = levelBase.find(o => o.type === 'finish').x;
        let level = [];

        function sendScoreToParent() {
            if (scoreSent) return;
            scoreSent = true;
            const rawPercent = (totalDistanceTraveled / (finishLineX - player.x)) * 100;
            const finalPercent = Math.min(100, Math.max(0, Math.floor(rawPercent)));
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'updateScore', stage: 'stage01', percentage: finalPercent }, '*');
            }
        }

        function exitToLevels() {
            bgMusic.pause();
            isPaused = false;
            pauseOverlay.style.display = 'none';
            winOverlay.style.display = 'none';
            if (window.parent !== window) {
                window.parent.postMessage('startMenuBgm', '*');
                window.parent.postMessage('navigate-back', '*');
            } else {
                window.location.href = 'levels.html';
            }
        }

        function createParticles() {
            if (particlesSpawned) return;
            particlesSpawned = true;
            const colors = ['#00d2ff', '#fff700', '#ff00ff'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'floating-particle';
                const size = Math.random() * 15 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (Math.random() * 4 + 6) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                particleContainer.appendChild(p);
            }
        }

        function clearParticles() {
            particleContainer.innerHTML = '';
            particlesSpawned = false;
        }

        function togglePause() {
            if (!hasStartedOnce || isGameOver || isGameWon) return;
            isPaused = !isPaused;
            if (isPaused) {
                bgMusic.pause();
                pauseOverlay.style.display = 'flex';
            } else {
                bgMusic.play().catch(() => {});
                pauseOverlay.style.display = 'none';
            }
        }

        function resetFromPause() {
            isPaused = false;
            pauseOverlay.style.display = 'none';
            resetLevelOnly();
        }

        function getPulseBrightness() {
            const time = Date.now() / 1000;
            return 1.45 - ((time % PULSE_PERIOD) / PULSE_PERIOD) * 0.45;
        }

        function getBgPulse() {
            return 1 - ((Date.now() / 1000 % PULSE_PERIOD) / PULSE_PERIOD);
        }

        function adjustBrightness(hex, multiplier) {
            let r = parseInt(hex.slice(1,3),16),
                g = parseInt(hex.slice(3,5),16),
                b = parseInt(hex.slice(5,7),16);
            r = Math.min(255, Math.floor(r * multiplier));
            g = Math.min(255, Math.floor(g * multiplier));
            b = Math.min(255, Math.floor(b * multiplier));
            return `rgb(${r},${g},${b})`;
        }

        function startCountdown() {
            isCountingDown = true;
            firstTimeStart = false;
            countdownValue = "3";
            initLevelData();

            setTimeout(() => { if(isCountingDown) countdownValue = "2"; }, 1000);
            setTimeout(() => { if(isCountingDown) countdownValue = "1"; }, 2000);
            setTimeout(() => {
                if(isCountingDown) {
                    countdownValue = "GO!";
                    hasStartedOnce = true;
                    isCountingDown = false;
                    bgMusic.volume = bgmVolume * 0.5;
                    bgMusic.play().catch(() => {});
                    setTimeout(() => { countdownValue = ""; }, 1000);
                }
            }, 3000);
        }

        function initLevelData() {
            groundY = canvas.height - 120;
            totalDistanceTraveled = 0;
            scoreSent = false;
            clearParticles();
            winOverlay.style.display = 'none';

            if (autoRestartTimer) {
                clearTimeout(autoRestartTimer);
                autoRestartTimer = null;
            }

            level = levelBase.map(obj => ({
                ...obj,
                w: obj.w || BLOCK_SIZE,
                h: obj.h || BLOCK_SIZE,
                y: (groundY / ZOOM_LEVEL) - (obj.yOff || 0),
                x: obj.x
            }));

            player.y = (groundY / ZOOM_LEVEL) - player.height;
            player.dy = 0;
            player.rotation = 0;
            isGameOver = false;
            isGameWon = false;
        }

        function resetLevelOnly() {
            initLevelData();
            hasStartedOnce = true;
            bgMusic.currentTime = 0;
            bgMusic.volume = bgmVolume * 0.5;
            bgMusic.play().catch(() => {});
        }

        function update() {
            if (isPaused || !hasStartedOnce || isGameOver || isGameWon) {
                if (isGameWon) {
                    bgMusic.pause();
                    winOverlay.style.display = 'flex';
                    sendScoreToParent();
                }
                if (isGameOver && hasStartedOnce) {
                    bgMusic.pause();
                    document.body.style.backgroundColor = "#050510";
                    if (autoRestartEnabled && !autoRestartTimer) {
                        autoRestartTimer = setTimeout(() => {
                            resetLevelOnly();
                            autoRestartTimer = null;
                        }, 1000);
                    }
                }
                return;
            }

            if (isInputActive && player.isGrounded) {
                player.dy = jumpForce;
                player.isGrounded = false;
            }

            player.dy += gravity;
            if (player.dy > terminalVelocity) player.dy = terminalVelocity;
            player.y += player.dy;

            if (!player.isGrounded) player.rotation += 5;
            else player.rotation = Math.round(player.rotation / 90) * 90;

            let currentGround = groundY / ZOOM_LEVEL;
            if (player.y + player.height >= currentGround) {
                player.y = currentGround - player.height;
                player.dy = 0;
                player.isGrounded = true;
            } else {
                player.isGrounded = false;
            }

            totalDistanceTraveled += gameSpeed;

            if (totalDistanceTraveled >= PULSE_TRIGGER_X) createParticles();

            level.forEach(obs => {
                obs.x -= gameSpeed;
                const pL = player.x + 6, pR = player.x + player.width - 6;
                const pT = player.y + 2, pB = player.y + player.height - 2;
                const oL = obs.x, oR = obs.x + obs.w;
                let oT, oB;

                if (obs.isUpsideDown) {
                    oT = obs.y;
                    oB = obs.y + obs.h;
                } else {
                    oT = obs.y - (obs.h || BLOCK_SIZE);
                    oB = obs.y;
                }

                if (pR > oL && pL < oR) {
                    if (obs.type === 'spike') {
                        if (pB > oT + 8 && pT < oB - 8) {
                            isGameOver = true;
                            deathSfx.volume = sfxVolume;
                            deathSfx.currentTime = 0;
                            deathSfx.play().catch(() => {});
                        }
                    }
                    else if (obs.type === 'block') {
                        if (player.dy >= 0 && (player.y + player.height) <= oT + 15 && (player.y + player.height) >= oT - 10) {
                            player.y = oT - player.height;
                            player.dy = 0;
                            player.isGrounded = true;
                        } else if (pB > oT + 10 && pT < oB) {
                            isGameOver = true;
                            deathSfx.volume = sfxVolume;
                            deathSfx.currentTime = 0;
                            deathSfx.play().catch(() => {});
                        }
                    }
                }

                if (obs.type === 'finish' && player.x > obs.x) {
                    if (!isGameWon) {
                        isGameWon = true;
                        stageCompleteSfx.volume = sfxVolume;
                        stageCompleteSfx.currentTime = 0;
                        stageCompleteSfx.play().catch(() => {});
                        sendScoreToParent();
                    }
                }
            });

            const rawPercent = (totalDistanceTraveled / (finishLineX - player.x)) * 100;
            const displayPercent = Math.min(100, Math.max(0, Math.floor(rawPercent)));

            if (showPercentageEnabled) {
                percentageDisplay.style.display = 'block';
                percentageDisplay.innerText = displayPercent + "%";
            } else {
                percentageDisplay.style.display = 'none';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();

            const pulse = getPulseBrightness();
            const bgPulseVal = getBgPulse();
            const isPulsingZone = totalDistanceTraveled >= PULSE_TRIGGER_X;

            if (isPulsingZone && hasStartedOnce && !isGameOver && !isGameWon && !isPaused) {
                document.body.style.backgroundColor = `rgb(${Math.floor(5+50*bgPulseVal)},${Math.floor(5+10*bgPulseVal)},${Math.floor(16+75*bgPulseVal)})`;
            } else if (!isPaused) {
                document.body.style.backgroundColor = "#050510";
            }

            ctx.scale(ZOOM_LEVEL, ZOOM_LEVEL);

            if (!firstTimeStart) {
                level.forEach(obs => {
                    ctx.save();
                    const shouldPulse = (obs.x + totalDistanceTraveled) >= PULSE_TRIGGER_X;
                    const pMult = (shouldPulse && !isPaused) ? pulse : 1.0;

                    if (obs.type === 'spike') {
                        ctx.shadowBlur = 15 * pMult;
                        ctx.shadowColor = adjustBrightness("#ff0055", pMult);
                        ctx.fillStyle = adjustBrightness("#ff0055", pMult);
                        ctx.beginPath();
                        if (obs.isUpsideDown) {
                            ctx.moveTo(obs.x, obs.y);
                            ctx.lineTo(obs.x + obs.w/2, obs.y + obs.h);
                            ctx.lineTo(obs.x + obs.w, obs.y);
                        } else {
                            ctx.moveTo(obs.x, obs.y);
                            ctx.lineTo(obs.x + obs.w/2, obs.y - obs.h);
                            ctx.lineTo(obs.x + obs.w, obs.y);
                        }
                        ctx.fill();
                    }
                    else if (obs.type === 'block') {
                        ctx.shadowBlur = 12 * pMult;
                        ctx.shadowColor = adjustBrightness("#00d2ff", pMult);
                        ctx.fillStyle = adjustBrightness("#00d2ff", pMult);
                        ctx.fillRect(obs.x + 2, obs.y - obs.h + 2, obs.w - 4, obs.h - 4);
                    }
                    else if (obs.type === 'finish') {
                        ctx.shadowBlur = 25;
                        ctx.shadowColor = "#00ff88";
                        ctx.fillStyle = "#00ff88";
                        ctx.fillRect(obs.x, 0, 10, groundY / ZOOM_LEVEL);
                        ctx.globalAlpha = 0.3;
                        ctx.fillRect(obs.x - 5, 0, 20, groundY / ZOOM_LEVEL);
                        ctx.globalAlpha = 1.0;
                    }
                    ctx.restore();
                });

                ctx.fillStyle = "#111122";
                ctx.fillRect(0, groundY / ZOOM_LEVEL, canvas.width, canvas.height);

                ctx.strokeStyle = "#7000ff";
                ctx.lineWidth = 2;
                ctx.strokeRect(-5, groundY / ZOOM_LEVEL, canvas.width + 10, 1);

                level.forEach(obs => {
                    if (obs.type === 'block') {
                        const shouldPulse = (obs.x + totalDistanceTraveled) >= PULSE_TRIGGER_X;
                        const pMult = (shouldPulse && !isPaused) ? pulse : 1.0;
                        ctx.fillStyle = adjustBrightness("#00d2ff", pMult);
                        ctx.fillRect(obs.x, obs.y - obs.h, obs.w, obs.h);
                        ctx.fillStyle = adjustBrightness("#00c7f2", pMult);
                        ctx.fillRect(obs.x + 4, obs.y - obs.h + 4, obs.w - 8, obs.h - 8);
                        ctx.strokeStyle = adjustBrightness("#ffffff", pMult);
                        ctx.lineWidth = 1;
                        ctx.strokeRect(obs.x, obs.y - obs.h, obs.w, obs.h);
                    }
                });

                if (!isGameWon && !(isGameOver && !displayDeathEnabled)) {
                    ctx.save();
                    ctx.translate(player.x + player.width/2, player.y + player.height/2);
                    ctx.rotate(player.rotation * Math.PI / 180);
                    ctx.fillStyle = playerCharColor;
                    ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);

                    if (playerImgObj.complete && playerImgObj.naturalWidth > 0) {
                        ctx.drawImage(playerImgObj, -player.width/2, -player.height/2, player.width, player.height);
                    } else {
                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
                        ctx.fillStyle = "#00d2ff";
                        ctx.fillRect(-player.width/2 + 4, -player.height/2 + 4, player.width - 8, player.height - 8);
                    }
                    ctx.restore();
                }
            }

            ctx.restore();

            if (firstTimeStart && !isCountingDown) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = '20px "Press Start 2P"';
                ctx.textAlign = "center";
                ctx.fillText("CLICK ANYWHERE TO START", canvas.width/2, canvas.height/2);
            }

            if (isCountingDown || countdownValue === "GO!") {
                ctx.fillStyle = "#fff";
                ctx.font = '60px "Press Start 2P"';
                ctx.textAlign = "center";
                ctx.fillText(countdownValue, canvas.width/2, canvas.height/2);
            }

            if (isGameOver && !isPaused) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (!autoRestartEnabled) {
                    ctx.fillStyle = "#ffffff";
                    ctx.font = '20px "Press Start 2P"';
                    ctx.textAlign = "center";
                    ctx.fillText("TRY AGAIN", canvas.width/2, canvas.height/2);
                }
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener("mousedown", () => {
            if (isPaused || isGameWon) return;
            if (isGameOver) {
                if (!autoRestartEnabled) resetLevelOnly();
            } else if (firstTimeStart && !isCountingDown) {
                startCountdown();
            } else if (hasStartedOnce) {
                isInputActive = true;
            }
        });

        window.addEventListener("mouseup", () => isInputActive = false);
        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") togglePause();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 120;
        });

        if (window.parent !== window) {
            window.parent.postMessage({ type: 'requestSettings' }, '*');
            window.parent.postMessage({ type: 'requestCharData' }, '*');
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'settingsData') {
                autoRestartEnabled = event.data.settings.autoRestart;
                showPercentageEnabled = event.data.settings.showPercentage;
                displayDeathEnabled = event.data.settings.displayDeath;
                bgmVolume = event.data.settings.bgm;
                sfxVolume = event.data.settings.sfx;
                bgMusic.volume = bgmVolume * 0.5;
                deathSfx.volume = sfxVolume;
                stageCompleteSfx.volume = sfxVolume;
                if (!showPercentageEnabled) {
                    percentageDisplay.style.display = 'none';
                }
            }
            if (event.data && event.data.type === 'charData') {
                playerCharImg = event.data.char.img;
                playerCharColor = event.data.char.color;
                playerImgObj.src = playerCharImg;
            }
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 120;

        loop();
    </script>
</body>
