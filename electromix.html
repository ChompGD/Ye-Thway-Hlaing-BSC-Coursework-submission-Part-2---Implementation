<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Jump: Neon Shift</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --accent-char: #00ff00;
            --text-main: #ffffff;
            --danger: #ff4444;
            --victory: #00ff88;
            --exit-yellow: #f8ff00;
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            font-family: 'Press Start 2P', cursive;
            color: var(--text-main);
        }
        
        #ui-layer {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 30;
        }
        
        #ui-layer h2 {
            font-size: 1.2rem;
            margin: 0;
            color: #fff;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .overlay h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
        }
        
        #pause-overlay h1 {
            text-shadow: 0 0 20px var(--accent-char);
        }
        
        #win-overlay h1 {
            color: var(--victory);
            text-shadow: 0 0 20px var(--victory);
        }
        
        .menu-btn {
            width: 280px;
            padding: 20px;
            margin: 10px;
            background: transparent;
            border: 3px solid var(--accent-char);
            color: var(--text-main);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .menu-btn:hover {
            background: var(--accent-char);
            color: #000;
            box-shadow: 0 0 20px var(--accent-char);
        }
        
        .win-btn {
            border-color: var(--victory);
            color: var(--victory);
        }
        
        .win-btn:hover {
            background: var(--victory);
            box-shadow: 0 0 20px var(--victory);
        }
        
        .exit-btn {
            border-color: var(--exit-yellow);
            color: var(--exit-yellow);
        }
        
        .exit-btn:hover {
            background: var(--exit-yellow);
            color: #000;
            box-shadow: 0 0 20px var(--exit-yellow);
        }
        
        .exit-red-btn {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .exit-red-btn:hover {
            background: var(--danger);
            color: #000;
            box-shadow: 0 0 20px var(--danger);
        }
        
        canvas {
            display: block;
            position: relative;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="ui-layer"><h2 id="percentage-display">0%</h2></div>

        <h1>PAUSED</h1>
        <button class="menu-btn" onclick="togglePause()">CONTINUE</button>
        <button class="menu-btn" onclick="resetFromPause()">RESTART</button>
        <button class="menu-btn exit-btn" onclick="exitToLevels()">EXIT</button>
    </div>

    <div id="win-overlay" class="overlay">
        <h1>STAGE COMPLETED</h1>
        <button class="menu-btn win-btn" onclick="resetLevelOnly()">RESTART</button>
        <button class="menu-btn exit-red-btn" onclick="exitToLevels()">EXIT</button>

        const finishLineX = levelBase.find(o => o.type === 'finish').x;
        let level = [];

        function sendScoreToParent() {
            if (scoreSent) return;
            scoreSent = true;
            const rawPercent = (totalDistanceTraveled / (finishLineX - player.x)) * 100;
            const finalPercent = Math.min(100, Math.max(0, Math.floor(rawPercent)));
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'updateScore', stage: 'stage04', percentage: finalPercent }, '*');
            }
        }

        function exitToLevels() {
            bgMusic.pause();
            isPaused = false;
            pauseOverlay.style.display = 'none';
            winOverlay.style.display = 'none';
            if (window.parent !== window) {
                window.parent.postMessage('startMenuBgm', '*');
                window.parent.postMessage('navigate-back', '*');
            } else {
                window.location.href = 'levels.html';
            }
        }

        function togglePause() {
            if (!hasStartedOnce || isGameOver || isGameWon) return;
            isPaused = !isPaused;
            if (isPaused) {
                bgMusic.pause();
                pauseOverlay.style.display = 'flex';
            } else {
                bgMusic.play().catch(() => {});
                pauseOverlay.style.display = 'none';
            }
        }

        function resetFromPause() {
            isPaused = false;
            pauseOverlay.style.display = 'none';
            resetLevelOnly();
        }

        function startCountdown() {
            isCountingDown = true;
            firstTimeStart = false;
            countdownValue = "3";
            initLevelData();
            bgMusic.currentTime = 0;

            setTimeout(() => { if(isCountingDown) countdownValue = "2"; }, 1000);
            setTimeout(() => { if(isCountingDown) countdownValue = "1"; }, 2000);
            setTimeout(() => {
                if(isCountingDown) {
                    countdownValue = "GO!";
                    hasStartedOnce = true;
                    isCountingDown = false;
                    bgMusic.volume = bgmVolume * 0.5;
                    bgMusic.play().catch(() => {});
                    setTimeout(() => { countdownValue = ""; }, 1000);
                }
            }, 3000);
        }

        function initLevelData() {
            groundY = canvas.height - 120;
            totalDistanceTraveled = 0;
            scoreSent = false;
            winOverlay.style.display = 'none';

            if (autoRestartTimer) {
                clearTimeout(autoRestartTimer);
                autoRestartTimer = null;
            }

            level = levelBase.map(obj => ({
                ...obj,
                w: obj.w || BLOCK_SIZE,
                h: obj.h || BLOCK_SIZE,
                y: (groundY / ZOOM_LEVEL) - (obj.yOff || 0),
                x: obj.x,
                used: false
            }));

            player.y = (groundY / ZOOM_LEVEL) - player.height;
            player.dy = 0;
            player.rotation = 0;
            isGameOver = false;
            isGameWon = false;
            canUseOrb = false;
            flashIntensity = 0;
            shakeTime = 0;
        }

        function resetLevelOnly() {
            initLevelData();
            hasStartedOnce = true;
            bgMusic.currentTime = 0;
            bgMusic.volume = bgmVolume * 0.5;
            bgMusic.play().catch(() => {});
        }

        function update() {
            if (isPaused || !hasStartedOnce || isGameOver || isGameWon) {
                if (isGameWon) {
                    bgMusic.pause();
                    winOverlay.style.display = 'flex';
                    sendScoreToParent();
                }
                if (isGameOver && hasStartedOnce) {
                    bgMusic.pause();
                    if (autoRestartEnabled && !autoRestartTimer) {
                        autoRestartTimer = setTimeout(() => {
                            resetLevelOnly();
                            autoRestartTimer = null;
                        }, 1000);
                    }
                }
                return;
            }

            if (totalDistanceTraveled >= 6600 && totalDistanceTraveled < 6600 + gameSpeed) {
                flashIntensity = 1.0;
                shakeTime = 20;
            }
            if (totalDistanceTraveled >= 9600 && totalDistanceTraveled < 9600 + gameSpeed) {
                flashIntensity = 1.0;
                shakeTime = 25;
            }

            if (flashIntensity > 0) flashIntensity -= 0.05;
            if (shakeTime > 0) shakeTime--;

            if (isInputActive && player.isGrounded) {
                player.dy = jumpForce;
                player.isGrounded = false;
                canUseOrb = false;
            }

            player.dy += gravity;
            if (player.dy > 12) player.dy = 12;
            player.y += player.dy;

            if (!player.isGrounded) player.rotation += 5;
            else player.rotation = Math.round(player.rotation / 90) * 90;

            let currentGround = groundY / ZOOM_LEVEL;
            if (player.y + player.height >= currentGround) {
                player.y = currentGround - player.height;
                player.dy = 0;
                player.isGrounded = true;
            } else {
                player.isGrounded = false;
            }

            totalDistanceTraveled += gameSpeed;

            level.forEach(obs => {
                obs.x -= gameSpeed;
                const pL = player.x + 6, pR = player.x + player.width - 6;
                const pT = player.y + 2, pB = player.y + player.height - 2;
                const oL = obs.x, oR = obs.x + obs.w;
                let oT = obs.y - obs.h, oB = obs.y;

                if (pR > oL && pL < oR) {
                    if (obs.type === 'pad' && pB > oT && pT < oB) {
                        player.dy = -13;
                        player.isGrounded = false;
                    } else if ((obs.type === 'orb' || obs.type === 'pink-orb') && pB > oT && pT < oB) {
                        if (isInputActive && !obs.used && !player.isGrounded && canUseOrb) {
                            player.dy = (obs.type === 'pink-orb') ? jumpForce * 0.75 : jumpForce;
                            player.isGrounded = false;
                            obs.used = true;
                            canUseOrb = false;
                        }
                    } else if (obs.type === 'spike' && pB > oT + 8 && pT < oB - 8) {
                        isGameOver = true;
                        bgMusic.pause();
                        deathSfx.volume = sfxVolume;
                        deathSfx.currentTime = 0;
                        deathSfx.play().catch(() => {});
                    } else if (obs.type === 'block') {
                        if (player.dy >= 0 && (player.y + player.height) <= oT + 15 && (player.y + player.height) >= oT - 10) {
                            player.y = oT - player.height;
                            player.dy = 0;
                            player.isGrounded = true;
                        } else if (pB > oT + 10 && pT < oB) {
                            isGameOver = true;
                            bgMusic.pause();
                            deathSfx.volume = sfxVolume;
                            deathSfx.currentTime = 0;
                            deathSfx.play().catch(() => {});
                        }
                    }
                }

                if (obs.type === 'finish' && player.x > obs.x) {
                    if (!isGameWon) {
                        isGameWon = true;
                        stageCompleteSfx.volume = sfxVolume;
                        stageCompleteSfx.currentTime = 0;
                        stageCompleteSfx.play().catch(() => {});
                        sendScoreToParent();
                    }
                }
            });

            const rawPercent = (totalDistanceTraveled / (finishLineX - player.x)) * 100;
            const displayPercent = Math.min(100, Math.max(0, Math.floor(rawPercent)));

            if (showPercentageEnabled) {
                percentageDisplay.style.display = 'block';
                percentageDisplay.innerText = displayPercent + "%";
            } else {
                percentageDisplay.style.display = 'none';
            }
        }

        function draw() {
            const isElectrified = totalDistanceTraveled >= 4360;
            if (isElectrified) {
                let pulse = (Math.sin(Date.now() / 200) * 15) + 30;
                ctx.fillStyle = `rgb(0, ${pulse}, 0)`;
            } else {
                ctx.fillStyle = "#000";
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
            }
            ctx.scale(ZOOM_LEVEL, ZOOM_LEVEL);

            if (!firstTimeStart) {
                let themeColor = "#00ff00";
                let blockFill = isElectrified ? "rgba(0, 255, 0, 0.4)" : "transparent";

                level.forEach(obs => {
                    ctx.save();
                    ctx.strokeStyle = themeColor;
                    ctx.fillStyle = blockFill;
                    ctx.lineWidth = 2;

                    if (isElectrified) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = themeColor;
                    }

                    if (obs.type === 'spike') {
                        ctx.beginPath();
                        if (obs.upsideDown) {
                            ctx.moveTo(obs.x, obs.y - obs.h);
                            ctx.lineTo(obs.x + obs.w/2, obs.y);
                            ctx.lineTo(obs.x + obs.w, obs.y - obs.h);
                        } else {
                            ctx.moveTo(obs.x, obs.y);
                            ctx.lineTo(obs.x + obs.w/2, obs.y - obs.h);
                            ctx.lineTo(obs.x + obs.w, obs.y);
                        }
                        ctx.closePath();
                        if (isElectrified) ctx.fill();
                        ctx.stroke();
                    } else if (obs.type === 'block') {
                        if (isElectrified) ctx.fillRect(obs.x, obs.y - obs.h, obs.w, obs.h);
                        ctx.strokeRect(obs.x, obs.y - obs.h, obs.w, obs.h);
                    } else if (obs.type === 'pad') {
                        ctx.fillStyle = "#ffcc00";
                        ctx.fillRect(obs.x, obs.y - 10, obs.w, 10);
                    } else if (obs.type === 'orb' || obs.type === 'pink-orb') {
                        ctx.fillStyle = (obs.type === 'orb') ? "#ffff00" : "#ff00ff";
                        ctx.beginPath();
                        ctx.arc(obs.x + obs.w/2, obs.y - obs.h/2, obs.w/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (obs.type === 'finish') {
                        ctx.fillStyle = "#00ff88";
                        ctx.fillRect(obs.x, 0, 10, groundY / ZOOM_LEVEL);
                    }
                    ctx.restore();
                });

                ctx.fillStyle = "#000";
                ctx.fillRect(0, groundY / ZOOM_LEVEL, canvas.width, canvas.height);

                ctx.strokeStyle = themeColor;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, groundY / ZOOM_LEVEL);
                ctx.lineTo(canvas.width, groundY / ZOOM_LEVEL);
                ctx.stroke();

                if (!isGameWon && !(isGameOver && !displayDeathEnabled)) {
                    ctx.save();
                    ctx.translate(player.x + player.width/2, player.y + player.height/2);
                    ctx.rotate(player.rotation * Math.PI / 180);
                    ctx.fillStyle = playerCharColor;
                    ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);

                    if (playerImgObj.complete && playerImgObj.naturalWidth > 0) {
                        ctx.drawImage(playerImgObj, -player.width/2, -player.height/2, player.width, player.height);
                    } else {
                        ctx.fillStyle = "#fff";
                        ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
                        ctx.fillStyle = "#00d2ff";
                        ctx.fillRect(-player.width/2 + 4, -player.height/2 + 4, player.width - 8, player.height - 8);
                    }
                    ctx.restore();
                }
            }

            ctx.restore();

            if (flashIntensity > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashIntensity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (firstTimeStart && !isCountingDown) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = '20px "Press Start 2P"';
                ctx.textAlign = "center";
                ctx.fillText("CLICK ANYWHERE TO START", canvas.width / 2, canvas.height / 2);
            }

            if (isCountingDown || countdownValue === "GO!") {
                ctx.fillStyle = "#fff";
                ctx.font = '60px "Press Start 2P"';
                ctx.textAlign = "center";
                ctx.fillText(countdownValue, canvas.width / 2, canvas.height / 2);
            }

            if (isGameOver && !isPaused) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (!autoRestartEnabled) {
                    ctx.fillStyle = "#ffffff";
                    ctx.font = '20px "Press Start 2P"';
                    ctx.textAlign = "center";
                    ctx.fillText("TRY AGAIN", canvas.width / 2, canvas.height / 2);
                }
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        const inputStart = () => {
            if (isPaused || isGameWon) return;
            if (isGameOver) {
                if (!autoRestartEnabled) resetLevelOnly();
            } else if (firstTimeStart && !isCountingDown) {
                startCountdown();
            } else if (hasStartedOnce) {
                isInputActive = true;
                if (!player.isGrounded) canUseOrb = true;
            }
        };

        const inputEnd = () => {
            isInputActive = false;
            canUseOrb = false;
        };

        window.addEventListener("mousedown", inputStart);
        window.addEventListener("mouseup", inputEnd);

        window.addEventListener("touchstart", (e) => {
            e.preventDefault();
            inputStart();
        }, { passive: false });

        window.addEventListener("touchend", (e) => {
            e.preventDefault();
            inputEnd();
        }, { passive: false });

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") togglePause();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 120;
        });

        if (window.parent !== window) {
            window.parent.postMessage({ type: 'requestSettings' }, '*');
            window.parent.postMessage({ type: 'requestCharData' }, '*');
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'settingsData') {
                autoRestartEnabled = event.data.settings.autoRestart;
                showPercentageEnabled = event.data.settings.showPercentage;
                displayDeathEnabled = event.data.settings.displayDeath;
                bgmVolume = event.data.settings.bgm;
                sfxVolume = event.data.settings.sfx;
                bgMusic.volume = bgmVolume * 0.5;
                deathSfx.volume = sfxVolume;
                stageCompleteSfx.volume = sfxVolume;
                if (!showPercentageEnabled) {
                    percentageDisplay.style.display = 'none';
                }
            }
            if (event.data && event.data.type === 'charData') {
                playerCharImg = event.data.char.img;
                playerCharColor = event.data.char.color;
                playerImgObj.src = playerCharImg;
            }
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 120;

        loop();
    </script>
</body>
